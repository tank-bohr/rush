# reek configuration for rush.
#
# reek runs as a forward-looking ratchet: most of its detectors are turned off
# here because they either (a) overlap the Sandi-Metz limits already enforced by
# RuboCop's Metrics cops (the single source of truth), (b) clash with this
# codebase's deliberate functional / AST-visitor architecture, or (c) misfire on
# Ruby idioms and the Racc-generated parser. What remains catches genuinely
# cryptic *new* names — the design smells reek would flag in the existing code
# are intentional and reviewed (see docs/journal.md and the RuboCop config).

exclude_paths:
  - lib/rush/parser.rb # generated by Racc; excluded from RuboCop and coverage too

detectors:
  # --- Overlaps RuboCop Metrics (rubocop owns these thresholds) ---
  TooManyStatements:
    enabled: false
  TooManyMethods:
    enabled: false
  TooManyInstanceVariables:
    enabled: false
  TooManyConstants:
    enabled: false
  LongParameterList:
    enabled: false

  # --- Clashes with the deliberate functional / visitor architecture ---
  # Nodes and helpers are intentionally small pure transforms that lean on a
  # collaborator (the executor / state); that is the design, not a smell.
  UtilityFunction:
    enabled: false
  FeatureEnvy:
    enabled: false
  DataClump:
    # Two genuine clumps were refactored out, not excluded: PipelineRunner's
    # (index, pipes) became a Stage value object, and PrintfFormatter's
    # (flags, conv) lost its pass-through method by consolidation. The two below
    # are not clumps:
    #  - Number: left/right are the two operands of binary integer arithmetic
    #    (binary/divide/modulo) — the irreducible arity of a binary op, with no
    #    domain concept to unify them; a Pair object would be pure ceremony.
    #  - CommandRunner: argv (expanded words) and io (the executor-wide fd table)
    #    come from separate phases and are each used independently elsewhere;
    #    they co-occur only in the local dispatch chain, and (executor, argv, io)
    #    is the established builtin call convention, not a missing value type.
    exclude:
      - Rush::Expansion::Arithmetic::Number
      - Rush::CommandRunner
  Attribute:
    # HereDoc#body (write-once, two-phase) became attr_reader + #fill, and
    # ShellState#name (set only at construction) became attr_reader. The three
    # below stay writable: they model the free-form mutable POSIX runtime —
    # $? (last_status), $PWD (pwd) and the positional parameters $1..$n
    # (positional) — which commands and builtins update directly. There is no
    # encapsulated invariant a setter would protect and no internal
    # representation it would leak (the attribute IS the concept), so a
    # record_status/replace_positional wrapper would only be a synonym for `=`.
    exclude:
      - Rush::ShellState#last_status
      - Rush::ShellState#pwd
      - Rush::ShellState#positional
  ControlParameter:
    # Two were refactored out, not excluded: SubstitutionReader#adjust became a
    # table lookup (@depth += DEPTH_DELTA.fetch(char, 0)), and Pipeline#escape
    # became a pure glob-escaper with the quoted decision moved to its caller.
    # The rest are not control couples:
    #  - the argument is the datum being computed/matched, not a behaviour flag:
    #    Number#bool (boolean -> 1/0), Parser#accept? (token matcher),
    #    Command#terse (renders `command -v` output per lookup-kind enum);
    #  - a value coalesce / default, not a branch: SystemCalls#trap_signal
    #    (command || block), FieldSplitter#initialize (ifs || WHITESPACE);
    #  - one factor in a compound precondition guard: AliasExpander#expand;
    #  - an irreducible domain distinction whose branch must live somewhere, so
    #    splitting only relocates the flag and polymorphism would be overkill:
    #    ShellState#set_option (option on/off), Printf#report (valid outcome),
    #    Repl#prompt_line (PS1 vs PS2), TildeExpander#rewrite (POSIX tilde after
    #    a colon only in assignments).
    exclude:
      - Rush::Expansion::Arithmetic::Number#bool
      - Rush::Expansion::Arithmetic::Parser#accept?
      - Rush::Builtins::Command#terse
      - Rush::SystemCalls#trap_signal
      - Rush::Expansion::FieldSplitter#initialize
      - Rush::Lexer::AliasExpander#expand
      - Rush::ShellState#set_option
      - Rush::Builtins::Printf#report
      - Rush::Repl#prompt_line
      - Rush::Expansion::TildeExpander#rewrite
  BooleanParameter:
    # Lexer#initialize stores `interactive` as @interactive and consults it in a
    # single private branch (heredoc_line): a here-doc truncated at EOF either
    # raises IncompleteInput (so ProgramReader pulls another line) or ends
    # leniently (the final, dash-compatible parse). It is constructor config, not
    # a per-call path switch — reek's own ControlParameter does NOT flag it, and
    # next_token's contract is identical in both modes; splitting the lexer in
    # two for a one-line leniency difference would be strictly worse. (The former
    # WordScanner `whole` flag was genuinely removed via the next_word/entire
    # factories, not excluded.)
    exclude:
      - Rush::Lexer#initialize
  DuplicateMethodCall:
    enabled: false # readability is preferred over micro-caching repeated calls

  # --- Off by project decision / Ruby idioms / false positives ---
  NilCheck:
    enabled: false # explicit nil handling is legitimate throughout
  InstanceVariableAssumption:
    enabled: false # lazy / conditional ivar initialisation is used deliberately
  ManualDispatch:
    # on_error renders whatever heterogeneous semantic value racc hands back for
    # the offending token (an AST::Word with #literal_text, or a bare operator
    # String); duck-typing is correct — there is no shared type to dispatch on.
    exclude:
      - Rush::ParserSupport#on_error
  MissingSafeMethod:
    # exit! mirrors Ruby's own Process.exit!/Kernel#exit! (force-exit, skipping
    # at_exit), not a custom "dangerous" variant that needs a bang-less twin.
    exclude:
      - exit!
  ModuleInitialize:
    # ParserSupport is the body of the Racc-generated Rush::Parser (its
    # `---- inner` block only `include`s this module), so the `initialize` here
    # IS the parser's initializer by design, not a surprise mixin override.
    exclude:
      - Rush::ParserSupport

  # --- Kept on (the ratchet): cryptic names in new code ---
  # The project deliberately uses single-letter names (rescue `e`, loop `i`,
  # arithmetic operands a/b/c, ...) — accepted; multi-character cryptic names and
  # the few standard method names below stay flagged.
  UncommunicativeVariableName:
    accept:
      - /^[a-z]$/
      - _ # the conventional "ignored value" name in destructuring/block params
  UncommunicativeMethodName:
    accept:
      - waitpid2

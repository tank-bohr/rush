# reek config for rush — a forward-looking ratchet: detectors that duplicate the
# RuboCop Metrics cops are off, the rest stay on. The excludes below are
# intentional and reviewed; per-case rationale lives in the commit history.

exclude_paths:
  - lib/rush/parser.rb # generated by Racc

detectors:
  # Duplicated by RuboCop's Metrics/MethodLength and Metrics/ParameterLists, or
  # bounded by Metrics/ClassLength — RuboCop owns those.
  TooManyStatements:
    enabled: false
  TooManyMethods:
    enabled: false
  TooManyConstants:
    enabled: false
  LongParameterList:
    enabled: false

  # No RuboCop equivalent; on as a ratchet (default cap 4). Excluded: the central
  # coordinators (ShellState/Executor) and the hand-written scanners.
  TooManyInstanceVariables:
    exclude:
      - Rush::ShellState
      - Rush::Executor
      - Rush::Lexer
      - Rush::Expansion::IfsScanner

  # SystemCalls is the injectable syscall port; HereDocRedirect#apply is a
  # polymorphic registry strategy — both must be instance methods.
  UtilityFunction:
    public_methods_only: true
    exclude:
      - Rush::SystemCalls
      - Rush::Redirection::HereDocRedirect#apply

  # Number's left/right are a binary op's operands; CommandRunner's (argv, io) is
  # part of the (executor, argv, io) builtin call convention.
  DataClump:
    exclude:
      - Rush::Expansion::Arithmetic::Number
      - Rush::CommandRunner

  # The argument is the datum, not a behaviour flag (Number#bool, Parser#accept?);
  # a coalesce (trap_signal); one factor in a compound predicate
  # (AliasExpander#eligible?); or an irreducible on/off the caller owns
  # (Options#set, Printf#report, Repl#prompt_line).
  ControlParameter:
    exclude:
      - Rush::Expansion::Arithmetic::Number#bool
      - Rush::Expansion::Arithmetic::Parser#accept?
      - Rush::SystemCalls#trap_signal
      - Rush::Lexer::AliasExpander#eligible?
      - Rush::Options#set
      - Rush::Builtins::Printf#report
      - Rush::Repl#prompt_line

  # Constructor config consulted in one private branch, not a per-call switch.
  BooleanParameter:
    exclude:
      - Rush::Lexer#initialize

  # Flag 3+ repeats, not 2: twice is idiomatic accessor reuse, and a stateful read
  # (e.g. @scanner.getch) returns a different value each call.
  DuplicateMethodCall:
    max_calls: 2

  # unset_or_null? needs value.nil? to mean UNSET — the POSIX ${x-} vs ${x:-} split.
  NilCheck:
    exclude:
      - Rush::Expansion::ParameterExpander#unset_or_null?

  # on_error duck-types the heterogeneous token racc hands back (no shared type).
  ManualDispatch:
    exclude:
      - Rush::ParserSupport#on_error

  # exit! mirrors Kernel#exit! (force-exit), not a custom bang needing a twin.
  MissingSafeMethod:
    exclude:
      - exit!

  # ParserSupport is the Racc parser's body, so its initialize IS the parser's.
  ModuleInitialize:
    exclude:
      - Rush::ParserSupport

  # Only `e` is accepted — RuboCop's Naming/RescuedExceptionsVariableName forces
  # that name for rescues; everything else is spelled out.
  UncommunicativeVariableName:
    accept:
      - /^e$/
  UncommunicativeMethodName:
    accept:
      - waitpid2

# reek configuration for rush.
#
# reek runs as a forward-looking ratchet: most of its detectors are turned off
# here because they either (a) overlap the Sandi-Metz limits already enforced by
# RuboCop's Metrics cops (the single source of truth), (b) clash with this
# codebase's deliberate functional / AST-visitor architecture, or (c) misfire on
# Ruby idioms and the Racc-generated parser. What remains catches genuinely
# cryptic *new* names — the design smells reek would flag in the existing code
# are intentional and reviewed (see docs/journal.md and the RuboCop config).

exclude_paths:
  - lib/rush/parser.rb # generated by Racc; excluded from RuboCop and coverage too

detectors:
  # --- Overlaps RuboCop Metrics (rubocop owns these thresholds) ---
  TooManyStatements:
    enabled: false
  TooManyMethods:
    enabled: false
  TooManyInstanceVariables:
    enabled: false
  TooManyConstants:
    enabled: false
  LongParameterList:
    enabled: false

  # --- Clashes with the deliberate functional / visitor architecture ---
  # Nodes and helpers are intentionally small pure transforms that lean on a
  # collaborator (the executor / state); that is the design, not a smell.
  UtilityFunction:
    # Private pure helpers are cohesive implementation details of their class
    # (the small-transform functional style), so only PUBLIC state-less methods
    # are flagged. The two that remain are stateless by design:
    #  - SystemCalls is the impure PORT: every method is a thin syscall wrapper
    #    that must be an instance method so the fake (spec/support/
    #    fake_system_calls.rb) can be injected in its place; module functions
    #    would break that test seam.
    #  - HereDocRedirect#apply is a registry strategy: the redirection registry
    #    stores applier instances and calls #apply polymorphically by kind, so it
    #    must be an instance method even though it holds no state.
    public_methods_only: true
    exclude:
      - Rush::SystemCalls
      - Rush::Redirection::HereDocRedirect#apply
  FeatureEnvy:
    # PipelineRunner#stage_io was genuinely moved onto Stage (Stage#io), which
    # owns its fd topology. The rest, after reading each, are not misplaced:
    #  - the method transforms a primitive or stdlib value passed as its arg, so
    #    Ruby offers no clean home for it (a core-ext / Refused Bequest): Set#apply
    #    (String), Set#advance / Test#without_close / TestExpr#four? /
    #    ReadSplitter#pad / ReadSplitter#trim_last (Array), TestExpr#to_int
    #    (String), Pipeline#tilde_expand (Symbol);
    #  - it dispatches on a value's kind enum: CommandLookup#describe (a lookup
    #    result kind). Pipeline#scalar_segment now does this as a kind->expander
    #    dispatch table (no conditional), but still reads the segment twice — kind
    #    to pick the expander, value to feed it — vs @executor once, so it envies
    #    the segment. It cannot move onto AST::WordSegment: that is a pure-data node
    #    in the AST layer, which has ZERO dependencies on Expansion (the dependency
    #    runs one way, Expansion -> AST); carrying an expander there would invert
    #    that into a cycle and make a value object instantiate expanders / run
    #    command subs;
    #  - it is a predicate/transform that needs both self and the value's fields
    #    and has no cohesive home on the value: AliasExpander#plain?
    #    (alias-specific), TildeExpander#expand (the leading-segment tilde rewrite
    #    is tilde-domain).
    exclude:
      - Rush::Builtins::Set#advance
      - Rush::Builtins::Set#apply
      - Rush::Builtins::Test#without_close
      - Rush::Builtins::TestExpr#four?
      - Rush::Builtins::TestExpr#to_int
      - Rush::CommandLookup#describe
      - Rush::Expansion::Pipeline#scalar_segment
      - Rush::Expansion::Pipeline#tilde_expand
      - Rush::Expansion::ReadSplitter#pad
      - Rush::Expansion::ReadSplitter#trim_last
      - Rush::Expansion::TildeExpander#expand
      - Rush::Lexer::AliasExpander#plain?
  DataClump:
    # Two genuine clumps were refactored out, not excluded: PipelineRunner's
    # (index, pipes) became a Stage value object, and PrintfFormatter's
    # (flags, conv) lost its pass-through method by consolidation. The two below
    # are not clumps:
    #  - Number: left/right are the two operands of binary integer arithmetic
    #    (binary/divide/modulo) — the irreducible arity of a binary op, with no
    #    domain concept to unify them; a Pair object would be pure ceremony.
    #  - CommandRunner: argv (expanded words) and io (the executor-wide fd table)
    #    come from separate phases and are each used independently elsewhere;
    #    they co-occur only in the local dispatch chain, and (executor, argv, io)
    #    is the established builtin call convention, not a missing value type.
    exclude:
      - Rush::Expansion::Arithmetic::Number
      - Rush::CommandRunner
  Attribute:
    # HereDoc#body (write-once, two-phase) became attr_reader + #fill;
    # ShellState#name (set only at construction) and #pwd (now mutated only via
    # #move_to, which keeps $OLDPWD/$PWD in step) became attr_reader. The two
    # below stay writable: they model free-form mutable POSIX runtime —
    # $? (last_status) and the positional parameters $1..$n (positional) — which
    # commands and builtins update directly. There is no encapsulated invariant a
    # setter would protect and no internal representation it would leak (the
    # attribute IS the concept), so a record_status/replace_positional wrapper
    # would only be a synonym for `=`.
    exclude:
      - Rush::ShellState#last_status
      - Rush::ShellState#positional
  ControlParameter:
    # Two were refactored out, not excluded: SubstitutionReader#adjust became a
    # table lookup (@depth += DEPTH_DELTA.fetch(char, 0)), and Pipeline#escape
    # became a pure glob-escaper with the quoted decision moved to its caller.
    # The rest are not control couples:
    #  - the argument is the datum being computed/matched, not a behaviour flag:
    #    Number#bool (boolean -> 1/0), Parser#accept? (token matcher),
    #    Command#terse (renders `command -v` output per lookup-kind enum);
    #  - a value coalesce / default, not a branch: SystemCalls#trap_signal
    #    (command || block), FieldSplitter#initialize (ifs || WHITESPACE);
    #  - one factor in a compound precondition guard: AliasExpander#expand;
    #  - an irreducible domain distinction whose branch must live somewhere, so
    #    splitting only relocates the flag and polymorphism would be overkill:
    #    ShellState#set_option (option on/off), Printf#report (valid outcome),
    #    Repl#prompt_line (PS1 vs PS2), TildeExpander#rewrite (POSIX tilde after
    #    a colon only in assignments).
    exclude:
      - Rush::Expansion::Arithmetic::Number#bool
      - Rush::Expansion::Arithmetic::Parser#accept?
      - Rush::Builtins::Command#terse
      - Rush::SystemCalls#trap_signal
      - Rush::Expansion::FieldSplitter#initialize
      - Rush::Lexer::AliasExpander#expand
      - Rush::ShellState#set_option
      - Rush::Builtins::Printf#report
      - Rush::Repl#prompt_line
      - Rush::Expansion::TildeExpander#rewrite
  BooleanParameter:
    # Lexer#initialize stores `interactive` as @interactive and consults it in a
    # single private branch (heredoc_line): a here-doc truncated at EOF either
    # raises IncompleteInput (so ProgramReader pulls another line) or ends
    # leniently (the final, dash-compatible parse). It is constructor config, not
    # a per-call path switch — reek's own ControlParameter does NOT flag it, and
    # next_token's contract is identical in both modes; splitting the lexer in
    # two for a one-line leniency difference would be strictly worse. (The former
    # WordScanner `whole` flag was genuinely removed via the next_word/entire
    # factories, not excluded.)
    exclude:
      - Rush::Lexer#initialize
  DuplicateMethodCall:
    # The default (flag a call repeated 2+ times) over-fires here: twice is
    # idiomatic accessor reuse where a local is just micro-caching, and worse,
    # stateful reads like @scanner.getch return a DIFFERENT value each call, so
    # "caching" them would be a bug, not a fix. max_calls: 2 flags only 3+
    # repeats — the point at which a local genuinely clarifies — and those were
    # fixed by extracting locals (FunctionRunner/ForRunner state, ParameterExpander
    # @ref.op, Tokenizer matched, Set#advance, Kill#parse, Cd#update_pwd, splat?)
    # or, for scalar_segment, by a kind->expander dispatch table. Three residual
    # 3+ repeats are kept and excluded:
    #  - Tokenizer#next_token reads @scanner.matched after each scan attempt; like
    #    getch it returns a different value each time, so it cannot be hoisted;
    #  - ParameterExpander#expand (@ref.op) and FunctionRunner#call/#with_args
    #    (@executor.state) repeat an IVAR's accessor — hoisting it to a local turns
    #    self-state reads into an external referent and trips FeatureEnvy instead,
    #    a genuine conflict between the two detectors, so the cheap accessor stays.
    max_calls: 2
    exclude:
      - Rush::Expansion::Arithmetic::Tokenizer#next_token
      - Rush::Expansion::ParameterExpander#expand
      - Rush::FunctionRunner#call
      - Rush::FunctionRunner#with_args

  # --- Off by project decision / Ruby idioms / false positives ---
  NilCheck:
    # Most nil-checks were genuinely removed: explicit `x.nil?` ternaries were
    # flipped to the positive case (read/cook, resolver, shell_state#restore,
    # kill), guards became idiomatic `unless x` / `!x` (set, trap, lexer,
    # program_reader, substitution_reader, alias_expander, pipeline, dup_redirect,
    # parameter_expander#plain, tilde_expander, WordScanner), and an
    # unset-or-empty test became `value.to_s.strip.empty?` (evaluator). Two are
    # kept and excluded:
    #  - Hash#known? returns `!kind.nil?`; the truthy `!!kind` is forbidden by
    #    RuboCop Style/DoubleNegation, so the explicit nil-check is the clean form.
    #  - ParameterExpander#unset_or_null? relies on `value.nil?` meaning UNSET as
    #    distinct from null/empty — the POSIX ${x-} vs ${x:-} distinction a truthy
    #    test would obscure.
    exclude:
      - Rush::Builtins::Hash#known?
      - Rush::Expansion::ParameterExpander#unset_or_null?
  InstanceVariableAssumption:
    # The lazy per-operation ivars were genuinely initialised in their
    # constructors (ProgramReader @buffer, PrintfFormatter @consumed,
    # SubstitutionReader @depth), and Dot/Eval/Exec/Read now read @io through
    # Base's inherited #io accessor rather than the raw ivar. Builtins::Command
    # keeps the raw @io (the accessor's extra method call would push run past the
    # enforced Metrics/AbcSize limit) and is excluded — @io is initialised in the
    # Base#initialize it inherits, which reek's per-class analysis cannot see.
    # The two after it ARE set in
    # #initialize, but via a private helper (setup / initialize_runtime) that
    # exists to satisfy RuboCop Metrics/MethodLength; reek analyses each method
    # in isolation so it cannot see the helper, and inlining to satisfy reek
    # would break the enforced method-length limit. (Executor#@exiting is also a
    # transient exit-trap flag, nil unless a trap runs, read as `@exiting || x`.)
    # Lexer has the same helper-init case but uses an inline :reek: directive so
    # the exclude does not also swallow its nested classes (reek matches the
    # unanchored, quoted string against the full name).
    exclude:
      - Rush::Builtins::Command
      - Rush::ShellState
      - Rush::Executor
  ManualDispatch:
    # on_error renders whatever heterogeneous semantic value racc hands back for
    # the offending token (an AST::Word with #literal_text, or a bare operator
    # String); duck-typing is correct — there is no shared type to dispatch on.
    exclude:
      - Rush::ParserSupport#on_error
  MissingSafeMethod:
    # exit! mirrors Ruby's own Process.exit!/Kernel#exit! (force-exit, skipping
    # at_exit), not a custom "dangerous" variant that needs a bang-less twin.
    exclude:
      - exit!
  ModuleInitialize:
    # ParserSupport is the body of the Racc-generated Rush::Parser (its
    # `---- inner` block only `include`s this module), so the `initialize` here
    # IS the parser's initializer by design, not a surprise mixin override.
    exclude:
      - Rush::ParserSupport

  # --- Kept on (the ratchet): cryptic names in new code ---
  # The project deliberately uses single-letter names (rescue `e`, loop `i`,
  # arithmetic operands a/b/c, ...) — accepted; multi-character cryptic names and
  # the few standard method names below stay flagged.
  UncommunicativeVariableName:
    accept:
      - /^[a-z]$/
      - _ # the conventional "ignored value" name in destructuring/block params
  UncommunicativeMethodName:
    accept:
      - waitpid2

plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Include:
    - '**/*.rb'
    - '**/*.rake'
    - '**/*.gemspec'
    - '**/Rakefile'
    - 'exe/rush'
  Exclude:
    - 'lib/rush/parser.rb'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'

# Sandi Metz limits enforced as code style (mirrors the sandi_meter thresholds
# so the gate holds even if the unmaintained gem breaks on Ruby 4.0).
Metrics/MethodLength:
  Max: 5
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']
  # A constructor that only assigns fields is the least-complex code there is;
  # capping its length just forces a helper-split that hides ivars from reek
  # (InstanceVariableAssumption). Real constructor complexity is still caught by
  # AbcSize, which is NOT exempt here.
  AllowedMethods: ['initialize']

Metrics/ClassLength:
  Max: 100
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']

Metrics/ModuleLength:
  Max: 100
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']

Metrics/ParameterLists:
  Max: 4
  CountKeywordArgs: true

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'
    - 'Rakefile'
    - 'tasks/**/*.rake'

Metrics/AbcSize:
  Max: 17

# The differential corpus is a deliberately large table of shell snippets to
# compare against dash; it grows one block per slice and is data, not logic.
Metrics/CollectionLiteralLength:
  Exclude:
    - 'spec/**/*'

# Per-class/module descriptive comments are the project norm, double-guarded on
# purpose: this cop gives editor/LSP feedback, reek's IrresponsibleModule holds
# the gate. The one concern we deliberately enforce with both tools.
Style/Documentation:
  Enabled: true

# RuboCop ships a set of cops disabled by default (opt-in); NewCops:enable does
# NOT turn them on. Every one is listed explicitly here so this file is the single
# source of truth: a RuboCop upgrade can't silently flip a default, and the off
# cops are visible rather than hidden in RuboCop's own defaults.
#
# Opted in — these earn their keep without fighting the project's compact style:
Style/UnlessLogicalOperators:
  Enabled: true # forbid the confusing mixed `unless a && b || c`; plain guards stay
Style/InvertibleUnlessCondition:
  Enabled: true # `unless x.zero?` reads better as `if x.nonzero?`
Style/YodaExpression:
  Enabled: true
Style/ImplicitRuntimeError:
  Enabled: true # raise must name an error class, not a bare RuntimeError
Style/ReturnNil:
  Enabled: true # bare `return` everywhere; `return nil` is redundant
Lint/ShadowingOuterLocalVariable:
  Enabled: true
Naming/InclusiveLanguage:
  Enabled: true

# Left off — each weighed against the project's style and rejected; pinned to
# false so the decision is explicit. Grouped by department, alphabetical.
# Bundler
Bundler/GemComment: { Enabled: false }
Bundler/GemVersion: { Enabled: false }

# Gemspec
Gemspec/DependencyVersion: { Enabled: false }

# Layout
Layout/ClassStructure: { Enabled: false }
Layout/EmptyLineAfterMultilineCondition: { Enabled: false }
Layout/FirstArrayElementLineBreak: { Enabled: false }
Layout/FirstHashElementLineBreak: { Enabled: false }
Layout/FirstMethodArgumentLineBreak: { Enabled: false }
Layout/FirstMethodParameterLineBreak: { Enabled: false }
Layout/HeredocArgumentClosingParenthesis: { Enabled: false }
Layout/MultilineArrayLineBreaks: { Enabled: false }
Layout/MultilineAssignmentLayout: { Enabled: false }
Layout/MultilineHashKeyLineBreaks: { Enabled: false }
Layout/MultilineMethodArgumentLineBreaks: { Enabled: false }
Layout/MultilineMethodParameterLineBreaks: { Enabled: false }
Layout/RedundantLineBreak: { Enabled: false }
Layout/SingleLineBlockChain: { Enabled: false }

# Lint
Lint/ConstantResolution: { Enabled: false }
Lint/HeredocMethodCallPosition: { Enabled: false }
Lint/NumberConversion: { Enabled: false }

# Performance
Performance/ArraySemiInfiniteRangeSlice: { Enabled: false }
Performance/BigDecimalWithNumericArgument: { Enabled: false }
Performance/BlockGivenWithExplicitBlock: { Enabled: false }
Performance/Casecmp: { Enabled: false }
Performance/CaseWhenSplat: { Enabled: false }
Performance/ChainArrayAllocation: { Enabled: false }
Performance/IoReadlines: { Enabled: false }
Performance/OpenStruct: { Enabled: false }
Performance/SelectMap: { Enabled: false }

# RSpec
RSpec/AlignLeftLetBrace: { Enabled: false }
RSpec/AlignRightLetBrace: { Enabled: false }
RSpec/DescribedClassModuleWrapping: { Enabled: false }
RSpec/Dialect: { Enabled: false }
RSpec/MessageExpectation: { Enabled: false }
RSpec/Pending: { Enabled: false }

# Style
Style/ArrayCoercion: { Enabled: false }
Style/ArrayFirstLast: { Enabled: false }
Style/AsciiComments: { Enabled: false }
Style/AutoResourceCleanup: { Enabled: false }
Style/ClassMethodsDefinitions: { Enabled: false }
Style/CollectionMethods: { Enabled: false }
Style/ConstantVisibility: { Enabled: false }
Style/Copyright: { Enabled: false }
Style/DateTime: { Enabled: false }
Style/DisableCopsWithinSourceCodeDirective: { Enabled: false }
Style/DocumentationMethod: { Enabled: false }
Style/HashLookupMethod: { Enabled: false }
Style/InlineComment: { Enabled: false }
Style/IpAddresses: { Enabled: false }
Style/MethodCalledOnDoEndBlock: { Enabled: false }
Style/MethodCallWithArgsParentheses: { Enabled: false }
Style/MissingElse: { Enabled: false }
Style/MultilineMethodSignature: { Enabled: false }
Style/OptionHash: { Enabled: false }
Style/RedundantStructKeywordInit: { Enabled: false }
Style/RequireOrder: { Enabled: false }
Style/Send: { Enabled: false }
Style/SingleLineBlockParams: { Enabled: false }
Style/StaticClass: { Enabled: false }
Style/StringHashKeys: { Enabled: false }
Style/StringMethods: { Enabled: false }
Style/TopLevelMethodDefinition: { Enabled: false }
Style/TrailingCommaInBlockArgs: { Enabled: false }

# The plan keeps development dependencies declared in the gemspec (single source
# of truth), so do not force them into the Gemfile.
Gemspec/DevelopmentDependencies:
  Enabled: false

# All method definitions use the def...end form; endless defs are disallowed so
# the same kind of method never appears in two shapes.
Style/EndlessMethod:
  EnforcedStyle: disallow

Naming/MethodParameterName:
  AllowedNames: ['io', 'fd', 'n', 'r', 'w', 'm', 's', 'op']

RSpec/ExampleLength:
  Max: 12

RSpec/MultipleExpectations:
  Max: 6

RSpec/NestedGroups:
  Max: 5

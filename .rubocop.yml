plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Include:
    - '**/*.rb'
    - '**/*.rake'
    - '**/*.gemspec'
    - '**/Rakefile'
    - 'exe/rush'
  Exclude:
    - 'lib/rush/parser.rb'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'pkg/**/*'

# Sandi Metz limits enforced as code style (mirrors the sandi_meter thresholds
# so the gate holds even if the unmaintained gem breaks on Ruby 4.0).
Metrics/MethodLength:
  Max: 5
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']
  # A constructor that only assigns fields is the least-complex code there is;
  # capping its length just forces a helper-split that hides ivars from reek
  # (InstanceVariableAssumption). Real constructor complexity is still caught by
  # AbcSize, which is NOT exempt here.
  AllowedMethods: ['initialize']

Metrics/ClassLength:
  Max: 100
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']

Metrics/ModuleLength:
  Max: 100
  CountAsOne: ['array', 'hash', 'heredoc', 'method_call']

Metrics/ParameterLists:
  Max: 4
  CountKeywordArgs: true

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'
    - 'Rakefile'
    - 'tasks/**/*.rake'

Metrics/AbcSize:
  Max: 17

# The differential corpus is a deliberately large table of shell snippets to
# compare against dash; it grows one block per slice and is data, not logic.
Metrics/CollectionLiteralLength:
  Exclude:
    - 'spec/**/*'

# Per-class/module descriptive comments are the project norm, double-guarded on
# purpose: this cop gives editor/LSP feedback, reek's IrresponsibleModule holds
# the gate. The one concern we deliberately enforce with both tools.
Style/Documentation:
  Enabled: true

# RuboCop ships these cops disabled by default (opt-in); NewCops:enable does NOT
# turn them on. We opt into the ones that catch real issues without fighting the
# project's compact style.
Style/UnlessLogicalOperators:
  Enabled: true # forbid the confusing mixed `unless a && b || c`; plain guards stay
Style/InvertibleUnlessCondition:
  Enabled: true # `unless x.zero?` reads better as `if x.nonzero?`
Style/YodaExpression:
  Enabled: true
Style/ImplicitRuntimeError:
  Enabled: true # raise must name an error class, not a bare RuntimeError
Style/ReturnNil:
  Enabled: true # bare `return` everywhere; `return nil` is redundant
Lint/ShadowingOuterLocalVariable:
  Enabled: true
Naming/InclusiveLanguage:
  Enabled: true

# The plan keeps development dependencies declared in the gemspec (single source
# of truth), so do not force them into the Gemfile.
Gemspec/DevelopmentDependencies:
  Enabled: false

# Off: one-expression methods are written as endless defs throughout. The
# allow_single_line default split the longer one-liners into def...end, so the
# same kind of method showed up in two forms. Disabled so they stay uniform.
Style/EndlessMethod:
  Enabled: false

Naming/MethodParameterName:
  AllowedNames: ['io', 'fd', 'n', 'r', 'w', 'm', 's', 'op']

RSpec/ExampleLength:
  Max: 12

RSpec/MultipleExpectations:
  Max: 6

RSpec/NestedGroups:
  Max: 5
